<div class="chat-root" [class.dark]="isDark()">

  @if (sidebarOpen()) {
    <div class="sidebar-backdrop" (click)="sidebarOpen.set(false)"></div>
  }

  <app-sidebar
    [convs]="convs()"
    [activeId]="activeConvId()"
    [loading]="loadingConvs()"
    [error]="convsError()"
    [open]="sidebarOpen()"
    (close)="sidebarOpen.set(false)"
    (newChat)="startNewChat()"
    (selectConv)="loadConv($event)"
    (convRenamed)="onConvRenamed($event)"
    (convDeleted)="onConvDeleted($event)"
    (retry)="loadConvs()"
  />

  <div class="chat-panel">

    <header class="chat-header">
      <button class="sidebar-toggle-btn" (click)="toggleSidebar()" type="button" title="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:18px;height:18px;">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>

      <div class="header-avatar">
        <img src="icon.png" alt="Airport Investment Radar" class="header-logo" />
      </div>

      <div class="header-info">
        <span class="header-name">Airport Investment Radar</span>
        <span class="header-status">US Airport Scoring</span>
      </div>

      <button class="theme-btn" (click)="toggleTheme()" type="button" [title]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (isDark()) {
          <!-- Sun icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;">
            <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;">
            <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z" clip-rule="evenodd"/>
          </svg>
        }
      </button>
    </header>

    <app-message-thread
      [msgs]="msgs()"
      [loading]="loading()"
      [scenarios]="scenarios()"
      (scenarioClick)="sendMsg($event)"
    />

    <app-tools-bar [capabilities]="capabilities()" />

    <app-message-input
      [loading]="loading()"
      (send)="sendMsg($event)"
    />

  </div>
</div>
